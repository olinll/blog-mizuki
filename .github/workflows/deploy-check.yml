name: 部署状态检查

on:
    push:
        branches: [main]
    workflow_dispatch:

jobs:
    check-deploy:
        name: 检查部署状态
        runs-on: ubuntu-latest
        steps:
            - name: 拉取代码
              uses: actions/checkout@v4

            - name: 执行部署检查并通知
              env:
                  BARK_KEY: WaY8cZzZQtMEE2zvrAooMK
                  COMMIT_MSG: ${{ github.event.head_commit.message }}
              run: |
                  # 从 src/config.ts 中提取 siteURL
                  SITE_URL=$(grep 'siteURL:' src/config.ts | sed -E 's/.*siteURL: "(.*)".*/\1/')
                  if [ -z "$SITE_URL" ]; then
                    echo "❌ 错误：在 src/config.ts 中找不到 siteURL"
                    exit 1
                  fi
                  echo "目标站点地址: $SITE_URL"

                  # 获取当前的 commit hash (前 7 位)
                  CURRENT_HASH=$(git rev-parse --short=7 HEAD)
                  echo "预期 Commit Hash: $CURRENT_HASH"

                  # 发送 Bark 通知的函数
                  send_notification() {
                    local status_text=$1
                    # 对推送标题进行处理，防止双引号破坏 JSON 格式
                    local escaped_msg=$(echo "$COMMIT_MSG" | sed 's/"/\\"/g' | tr -d '\n\r')
                    
                    echo "正在发送 Bark 通知..."
                    curl -f -X POST "https://api.day.app/push" \
                         -H "Content-Type: application/json" \
                         -d "{
                           \"device_key\": \"$BARK_KEY\",
                           \"title\": \"博客部署状态\",
                           \"body\": \"状态: $status_text\n内容: $escaped_msg\n提交: $CURRENT_HASH\n地址: $SITE_URL\",
                           \"group\": \"BlogDeploy\",
                           \"icon\": \"https://astro.build/favicon.svg\",
                           \"url\": \"$SITE_URL\"
                         }"
                  }

                  # 轮询检查
                  MAX_RETRIES=30
                  RETRY_INTERVAL=20

                  echo "开始部署检查轮询..."

                  for ((i=1; i<=MAX_RETRIES; i++)); do
                    echo "--- 尝试第 $i/$MAX_RETRIES 次 ---"
                    
                    ONLINE_HASH=$(curl -sL "$SITE_URL" | grep -oP 'blog-mizuki/commit/\K[a-z0-9]{7}' | head -n 1)
                    
                    if [ "$ONLINE_HASH" == "$CURRENT_HASH" ]; then
                      echo "✅ 成功！线上版本 ($ONLINE_HASH) 已与当前提交 ($CURRENT_HASH) 一致。"
                      echo "提示：博客已成功部署并更新到最新版本！"
                      send_notification "✅ 部署成功"
                      exit 0
                    fi
                    
                    if [ -z "$ONLINE_HASH" ]; then
                      echo "⏳ 尚未在页面上找到 Commit Hash。站点可能正在更新中..."
                    else
                      echo "⏳ 线上版本仍为 $ONLINE_HASH。等待更新至 $CURRENT_HASH..."
                    fi
                    
                    if [ $i -lt $MAX_RETRIES ]; then
                      echo "等待 $RETRY_INTERVAL 秒后进行下一次检查..."
                      sleep $RETRY_INTERVAL
                    fi
                  done

                  echo "❌ 错误：部署检查在 $((MAX_RETRIES * RETRY_INTERVAL / 60)) 分钟后超时。"
                  send_notification "❌ 部署检查超时"
                  exit 1
